# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- dev

pr: none

parameters:
- name: environment
  displayName: Environment
  type: string
  default: DEV_Stable_SDApp
  values: 
  #- DEV_SD6
  #- DEV_Stable
  - DEV_Stable_SDApp
  #- UAT
  - UAT_SDApp
  #- TRAINING
  - TRAINING_SDApp
  #- PROD
  - PROD_SDApp
- name: deploydb
  displayName: Deploy DB
  type: boolean
  default: false

variables:
  - group: SMT_${{ parameters.environment }}
  - name: solution
    value: "**/*.sln"
  - name: BuildPlatform
    value: "Any CPU"
  - name: BuildConfiguration
    value: "Release" 
  - name: ApiWorkingDirectory
    value: '$(Agent.BuildDirectory)\s\SMT-APIService' 
  - name: ArtifactName 
    value: 'UNICEF.$(AppName)'

stages:
  - stage: Build
    displayName: Build ${{ parameters.environment }}
    jobs:
    - job: Compile
      pool:
        vmImage: 'windows-latest'
      steps:
            
      - task: UseDotNet@2
        displayName: 'Use dot net SDK'
        inputs:
          packageType: 'sdk'
          version: '3.1.x'

      - task: NuGetToolInstaller@1
        displayName: 'Install Nuget tools'

      - task: NuGetCommand@2
        displayName: 'Install Nuget packages'
        inputs:
          restoreSolution: '$(solution)'

      - task: VSBuild@1
        displayName: 'Build solution'
        inputs:
          solution: '$(solution)'
          msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:DesktopBuildPackageLocation="$(build.artifactStagingDirectory)\WebApp.zip" /p:DeployIisAppPath="Default Web Site"'
          platform: '$(buildPlatform)'
          configuration: '$(buildConfiguration)'

      - task: VSTest@2
        displayName: 'Perform unit Tests'
        inputs:
          platform: '$(buildPlatform)'
          configuration: '$(buildConfiguration)'
          
      - task: PublishBuildArtifacts@1        
        displayName: 'Publish build Artifact'
        inputs:
          PathtoPublish: '$(build.artifactstagingdirectory)'
          ArtifactName: '$(ArtifactName)'

      - task: CredScan@2
        displayName: 'Run Credential Scanner'
        continueOnError: true
        inputs:
          toolMajorVersion: 'V2'
          outputFormat: 'csv'

      - task: PublishSecurityAnalysisLogs@2
        continueOnError: true
        displayName: 'Publish Security Analysis Logs'
        inputs:    
          AllTools: false
          AntiMalware: false
          BinSkim: false
          CredScan: true
          MSRD: false
          RoslynAnalyzers: false
          TSLint: false
          ToolLogsNotFoundAction: 'Standard'

      - task: PostAnalysis@1
        displayName: 'Perform Post Analysis'
        continueOnError: true
        inputs:
          AllTools: false
          BinSkim: false
          CredScan: true
          RoslynAnalyzers: false
          TSLint: false
          ToolLogsNotFoundAction: 'Standard'

  - stage: Deploy
    displayName: Deploy ${{ parameters.environment }}
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: ${{ parameters.environment }}
        displayName: Deploying to ${{ parameters.environment }}
        pool:
          vmImage: windows-latest
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: "Pull Artifact $(ArtifactName)"
                  inputs:
                    buildType: "current"
                    ArtifactName: "$(ArtifactName)"
                    downloadType: "single"
                    downloadPath: "$(build.artifactstagingdirectory)"

                - task: AzureRmWebAppDeployment@4
                  inputs:
                    ConnectionType: 'AzureRM'
                    azureSubscription: '$(AzureSubscription)'
                    appType: 'webApp'
                    WebAppName: '$(AppName)'
                    deployToSlotOrASE: true
                    ResourceGroupName: '$(AzureResourceGroup)'
                    SlotName: '$(AppSlot)'
                    packageForLinux: '$(build.artifactstagingdirectory)/**/$(ArtifactName)/*.zip'

                - task: AzureAppServiceSettings@1
                  displayName: Azure App Service Settings
