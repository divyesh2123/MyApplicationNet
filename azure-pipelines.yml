trigger:
- dev

pr: none

parameters:
- name: environment
  displayName: Environment
  type: string
  default: DEV
  values:
  - DEV
  - UAT

- name: deploydb
  displayName: Deploy DB
  type: boolean
  default: false

variables:
- group: ${{ parameters.environment }}

- name: solution
  value: "**/*.sln"

- name: BuildPlatform
  value: "Any CPU"

- name: BuildConfiguration
  value: "Release"

- name: ApiWorkingDirectory
  value: "$(Agent.BuildDirectory)"

- name: ArtifactName
  value: "$(Name)"

stages:

# ======================
# BUILD
# ======================

- stage: Build
  displayName: Build ${{ parameters.environment }}

  jobs:
  - job: Compile

    pool:
      vmImage: windows-latest

    steps:

    - task: UseDotNet@2
      displayName: Use dotnet SDK
      inputs:
        packageType: sdk
        version: 8.0.x

    - task: NuGetToolInstaller@1
      displayName: Install NuGet Tools

    - task: NuGetCommand@2
      displayName: Restore NuGet Packages
      inputs:
        restoreSolution: "$(solution)"

    - task: VSBuild@1
      displayName: Build Solution
      inputs:
        solution: "$(solution)"
        msbuildArgs: >
          /p:DeployOnBuild=true
          /p:WebPublishMethod=Package
          /p:PackageAsSingleFile=true
          /p:SkipInvalidConfigurations=true
          /p:DesktopBuildPackageLocation="$(Build.ArtifactStagingDirectory)\WebApp.zip"
          /p:DeployIisAppPath="Default Web Site"
        platform: "$(BuildPlatform)"
        configuration: "$(BuildConfiguration)"

    - task: VSTest@2
      displayName: Run Unit Tests
      inputs:
        platform: "$(BuildPlatform)"
        configuration: "$(BuildConfiguration)"

    - task: PublishBuildArtifacts@1
      displayName: Publish Build Artifact
      inputs:
        PathtoPublish: "$(Build.ArtifactStagingDirectory)"
        ArtifactName: "$(ArtifactName)"

# ======================
# DEPLOY
# ======================

- stage: Deploy
  displayName: Deploy ${{ parameters.environment }}
  dependsOn: Build
  condition: succeeded()

  jobs:

  - deployment: Deploy
    displayName: Deploy Application
    environment: ${{ parameters.environment }}

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: "$(ArtifactName)"

          - powershell: |

              Import-Module WebAdministration

              if (!(Test-Path "$(WebsitePath)")) {
                  New-Item `
                    -ItemType Directory `
                    -Path "$(WebsitePath)" `
                    -Force
              }

              Expand-Archive `
                -Path "$(Pipeline.Workspace)\$(ArtifactName)\WebApp.zip" `
                -DestinationPath "$(WebsitePath)" `
                -Force

              $app = "$(WebsitePath)\appsettings.json"

              if (Test-Path $app) {

                  $cfg = Get-Content $app -Raw | ConvertFrom-Json

                  $cfg.SmtpServer = "$(SmtpServer)"
                  $cfg.Port = [int]"$(Port)"
                  $cfg.SenderName = "$(SenderName)"
                  $cfg.SenderEmail = "$(SenderEmail)"
                  $cfg.Username = "$(Username)"
                  $cfg.Password = "$(Password)"

                  $cfg |
                    ConvertTo-Json -Depth 100 |
                    Set-Content $app
              }

              if (Get-WebAppPoolState -Name "$(Name)" -ErrorAction SilentlyContinue) {
                  Restart-WebAppPool "$(Name)"
              }

              Write-Host "Deployment completed successfully"

            displayName: Deploy IIS Application