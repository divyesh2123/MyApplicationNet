trigger:
- dev

pr: none

parameters:
- name: environment
  displayName: Environment
  type: string
  default: DEV
  values:
  - DEV
  - UAT

variables:
- group: ${{ parameters.environment }}

- name: solution
  value: "**/*.sln"

- name: BuildPlatform
  value: "Any CPU"

- name: BuildConfiguration
  value: "Release"

- name: ArtifactName
  value: "drop"

stages:

# =====================================
# BUILD
# =====================================

- stage: Build
  displayName: Build

  jobs:

  - job: Compile
    displayName: Compile Application

    pool:
      vmImage: windows-latest

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: 8.0.x

    - task: NuGetToolInstaller@1

    - task: NuGetCommand@2
      inputs:
        restoreSolution: "$(solution)"

    - task: DotNetCoreCLI@2
      displayName: Publish Application
      inputs:
        command: publish
        publishWebProjects: true
        arguments: >
          --configuration $(BuildConfiguration)
          --output $(Build.ArtifactStagingDirectory)\publish
        zipAfterPublish: false

    - task: VSTest@2
      inputs:
        platform: "$(BuildPlatform)"
        configuration: "$(BuildConfiguration)"

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: "$(Build.ArtifactStagingDirectory)/publish"
        ArtifactName: "$(ArtifactName)"

# =====================================
# DEPLOY
# =====================================

- stage: Deploy
  displayName: Deploy

  dependsOn: Build
  condition: succeeded()

  jobs:

  - deployment: DeployToEC2

    displayName: Deploy To EC2

    environment:
      name: DEV
      resourceType: VirtualMachine
      resourceName: EC2AMAZ-9C03K99

    strategy:

      runOnce:

        deploy:

          steps:

          - checkout: none

          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: current
              downloadType: single
              artifactName: "$(ArtifactName)"
              downloadPath: "$(Pipeline.Workspace)"

          - powershell: |

              Write-Host "================================"
              Write-Host "DEPLOYMENT TARGET"
              Write-Host "================================"

              hostname
              whoami
              $env:COMPUTERNAME

              Get-PSDrive

              Get-ChildItem "$(Pipeline.Workspace)" -Recurse

            displayName: Verify Deployment Target

          - powershell: |

              Import-Module WebAdministration

              $websitePath = "$(WebsitePath)"

              if (!(Test-Path $websitePath))
              {
                  New-Item `
                    -ItemType Directory `
                    -Path $websitePath `
                    -Force
              }

              Copy-Item `
                "$(Pipeline.Workspace)\$(ArtifactName)\*" `
                $websitePath `
                -Recurse `
                -Force

              $appSettingsFile = Join-Path $websitePath "appsettings.json"

              if (Test-Path $appSettingsFile)
              {
                  $json = Get-Content $appSettingsFile -Raw | ConvertFrom-Json

                  $json.EmailSettings.SmtpServer = "$(SmtpServer)"
                  $json.EmailSettings.Port = [int]"$(Port)"
                  $json.EmailSettings.SenderName = "$(SenderName)"
                  $json.EmailSettings.SenderEmail = "$(SenderEmail)"
                  $json.EmailSettings.Username = "$(Username)"
                  $json.EmailSettings.Password = "$(Password)"

                  $json | ConvertTo-Json -Depth 10 | Set-Content $appSettingsFile

                  Write-Host "EmailSettings updated successfully"
              }
              else
              {
                  Write-Host "appsettings.json not found"
              }

              if (Test-Path "IIS:\AppPools\$(Name)")
              {
                  Restart-WebAppPool "$(Name)"
              }

              Write-Host "Deployment Completed Successfully"

            displayName: Deploy IIS Application

