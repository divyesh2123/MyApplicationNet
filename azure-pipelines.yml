trigger:
- dev

pr: none

parameters:
- name: environment
  displayName: Environment
  type: string
  default: DEV
  values:
  - DEV
  - UAT

- name: deploydb
  displayName: Deploy DB
  type: boolean
  default: false

variables:
- group: ${{ parameters.environment }}

- name: solution
  value: "**/*.sln"

- name: BuildPlatform
  value: "Any CPU"

- name: BuildConfiguration
  value: "Release"

- name: ArtifactName
  value: "drop"

stages:

# ======================
# BUILD
# ======================

- stage: Build
  displayName: Build

  jobs:

  - job: Compile

    pool:
      vmImage: windows-latest

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: 8.0.x

    - task: NuGetToolInstaller@1

    - task: NuGetCommand@2
      inputs:
        restoreSolution: "$(solution)"

    - task: VSBuild@1
      inputs:
        solution: "$(solution)"
        msbuildArgs: >
          /p:DeployOnBuild=true
          /p:WebPublishMethod=Package
          /p:PackageAsSingleFile=true
          /p:SkipInvalidConfigurations=true
          /p:DesktopBuildPackageLocation="$(Build.ArtifactStagingDirectory)\WebApp.zip"
          /p:DeployIisAppPath="Default Web Site"

        platform: "$(BuildPlatform)"
        configuration: "$(BuildConfiguration)"

    - task: VSTest@2
      inputs:
        platform: "$(BuildPlatform)"
        configuration: "$(BuildConfiguration)"

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: "$(Build.ArtifactStagingDirectory)"
        ArtifactName: "$(ArtifactName)"


# ======================
# DEPLOY
# ======================

- stage: Deploy

  dependsOn: Build
  condition: succeeded()

  jobs:

  - deployment: Deploy

    timeoutInMinutes: 60

    environment: ${{ parameters.environment }}

    strategy:

      runOnce:

        deploy:

          steps:

          - checkout: none

          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: current
              downloadType: single
              artifactName: "$(ArtifactName)"
              downloadPath: "$(Pipeline.Workspace)"

          - powershell: |

              Write-Host "Machine:"
              hostname

              Get-ChildItem "$(Pipeline.Workspace)" -Recurse

            displayName: Verify Deployment Target


          - powershell: |

              Import-Module WebAdministration

              if (!(Test-Path "$(WebsitePath)")) {

                New-Item `
                  -ItemType Directory `
                  -Path "$(WebsitePath)" `
                  -Force

              }

              $zip = Get-ChildItem `
                "$(Pipeline.Workspace)" `
                -Recurse `
                -Filter WebApp.zip |
                Select-Object -First 1

              if (!$zip) {
                throw "WebApp.zip not found"
              }

              Expand-Archive `
                $zip.FullName `
                "$(WebsitePath)" `
                -Force


              $app = Join-Path "$(WebsitePath)" "appsettings.json"

              if (Test-Path $app) {

                $cfg =
                  Get-Content $app -Raw |
                  ConvertFrom-Json

                $cfg.SmtpServer="$(SmtpServer)"
                $cfg.Port=[int]"$(Port)"
                $cfg.SenderName="$(SenderName)"
                $cfg.SenderEmail="$(SenderEmail)"
                $cfg.Username="$(Username)"
                $cfg.Password="$(Password)"

                $cfg |
                  ConvertTo-Json -Depth 100 |
                  Set-Content $app
              }


              if (Test-Path IIS:\AppPools\$(Name)) {

                Restart-WebAppPool "$(Name)"

              }

              Write-Host "Deployment Completed"

            displayName: Deploy IIS Application